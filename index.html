<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồ Án 2 - MEDICAL VIP PRO</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><path fill='%23ff2a5f' d='M47.6 300.4L228.3 469.1c7.5 7 17.4 10.9 27.7 10.9s20.2-3.9 27.7-10.9L464.4 300.4c30.4-28.3 47.6-68 47.6-109.5v-5.8c0-69.9-50.5-129.5-119.4-141C347 36.5 300.6 51.4 268 84L256 96 244 84c-32.6-32.6-79-47.5-124.6-39.9C50.5 55.6 0 115.2 0 185.1v5.8c0 41.5 17.2 81.2 47.6 109.5z'/></svg>">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root { 
            --bg-deep: #050508;
            --bg-card: rgba(20, 20, 31, 0.8);
            --accent-hr: #ff2a5f;
            --accent-spo2: #00e5ff;
            --accent-success: #00ff88;
            --text-main: #e2e8f0;
            --glass: rgba(255, 255, 255, 0.03);
            --neon-border: rgba(0, 229, 255, 0.2);
        }

        body { 
            background: radial-gradient(circle at 50% 50%, #10101a 0%, #050508 100%);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; padding-top: 100px;
            min-height: 100vh;
        }

        /* --- NAVBAR VIP --- */
        .navbar-top {
            background: rgba(8, 8, 12, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--neon-border);
            height: 80px;
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .logo-box { display: flex; align-items: center; font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        .logo-box i { font-size: 2rem; filter: drop-shadow(0 0 10px var(--accent-hr)); }

        .nav-links-container { display: flex; gap: 15px; height: 100%; }
        .nav-item-custom {
            color: #8b9bb4; padding: 0 20px; font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; transition: 0.4s;
            text-transform: uppercase; font-weight: 700; position: relative;
        }
        .nav-item-custom:hover { color: var(--accent-spo2); background: rgba(0, 229, 255, 0.05); }
        .nav-item-custom.active {
            color: var(--accent-spo2);
            background: linear-gradient(to top, rgba(0, 229, 255, 0.1), transparent);
        }
        .nav-item-custom.active::after {
            content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
            background: var(--accent-spo2); box-shadow: 0 0 15px var(--accent-spo2);
        }

        /* --- CARDS & PANELS --- */
        .card-vip {
            background: var(--bg-card);
            border: 1px solid var(--neon-border);
            border-radius: 15px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }
        .card-vip::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(0, 229, 255, 0.05), transparent);
            pointer-events: none;
        }
        .card-vip:hover { border-color: var(--accent-spo2); transform: scale(1.01); }

        .value-display { font-family: 'Orbitron', sans-serif; font-size: 5rem; font-weight: 700; line-height: 1; }
        .val-hr { color: var(--accent-hr); text-shadow: 0 0 25px rgba(255, 42, 95, 0.5); }
        .val-spo2 { color: var(--accent-spo2); text-shadow: 0 0 25px rgba(0, 229, 255, 0.5); }

        /* --- TABLES --- */
        .table-vip { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .table-vip th { color: var(--accent-spo2); font-family: 'Orbitron', sans-serif; font-size: 0.8rem; padding: 15px; }
        .table-vip tr { background: rgba(255, 255, 255, 0.02); }
        .table-vip td { padding: 15px; border-top: 1px solid var(--neon-border); border-bottom: 1px solid var(--neon-border); }

        /* --- FORMS --- */
        .input-vip {
            background: rgba(0,0,0,0.5) !important;
            border: 1px solid var(--neon-border) !important;
            color: white !important;
            border-radius: 8px !important;
            padding: 12px !important;
        }
        .btn-vip {
            background: linear-gradient(45deg, var(--accent-spo2), #0091ff);
            color: black; font-family: 'Orbitron', sans-serif; font-weight: bold;
            border: none; padding: 15px 30px; border-radius: 10px; transition: 0.3s;
        }
        .btn-vip:hover { transform: translateY(-3px); box-shadow: 0 0 20px var(--accent-spo2); }

        /* --- SPLASH & OVERLAY --- */
        #splash-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #login-overlay { position: fixed; inset: 0; background: rgba(5,5,8,0.95); backdrop-filter: blur(20px); z-index: 9999; display: flex; align-items: center; justify-content: center; }

        .tab-pane { display: none; }
        .tab-pane.active { display: block; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-online { background: var(--accent-success); box-shadow: 0 0 10px var(--accent-success); }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="logo-box text-white mb-4">
        <i class="fas fa-microchip me-3"></i>
        <h1 class="m-0">SYSTEM INITIALIZING</h1>
    </div>
    <div class="spinner-grow text-info"></div>
</div>

<div id="login-overlay">
    <div class="card-vip text-center" style="width: 450px; border-width: 2px;">
        <i class="fas fa-shield-virus fa-4x mb-4 text-info"></i>
        <h2 class="fw-bold mb-4" style="font-family: 'Orbitron'">AUTHENTICATION</h2>
        <input type="text" id="deviceIdInput" class="form-control input-vip mb-4 text-center fs-5" placeholder="ENTER DEVICE ID">
        <button onclick="accessSystem()" class="btn btn-vip w-100">CONNECT TO SYSTEM</button>
    </div>
</div>

<nav class="navbar-top">
    <div class="logo-box">
        <i class="fas fa-heartbeat text-danger me-2"></i>
        <span class="text-white fs-4">MED<span style="color:var(--accent-spo2)">CORE</span></span>
    </div>
    
    <div class="nav-links-container">
        <div class="nav-item-custom active" onclick="switchMenu('monitor', this)"><i class="fas fa-project-diagram me-2"></i> MONITOR</div>
        <div class="nav-item-custom" onclick="switchMenu('patient', this)"><i class="fas fa-user-shield me-2"></i> PATIENT</div>
        <div class="nav-item-custom" onclick="switchMenu('history', this)"><i class="fas fa-database me-2"></i> LOGS</div>
        <div class="nav-item-custom" onclick="switchMenu('news', this)"><i class="fas fa-broadcast-tower me-2"></i> FEED</div>
    </div>

    <div class="d-flex align-items-center">
        <span class="status-dot status-online"></span>
        <span id="idDisplay" class="text-secondary fw-bold" style="font-family: 'Orbitron'; font-size: 0.8rem;">ID: OFFLINE</span>
    </div>
</nav>

<div class="container-fluid px-5 mt-4">
    <div id="monitor" class="tab-pane active">
        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card-vip mb-4">
                    <div class="d-flex justify-content-between align-items-start mb-4">
                        <h5 class="text-secondary"><i class="fas fa-wave-square me-2"></i>HEART RATE ANALYSIS</h5>
                        <div class="val-hr value-display" id="bpmVal">--</div>
                    </div>
                    <div style="height: 280px;"><canvas id="bpmChart"></canvas></div>
                </div>
                <div class="card-vip">
                    <h6 class="mb-4 text-info fw-bold">REAL-TIME DATA STREAM</h6>
                    <table class="table-vip text-center">
                        <thead><tr><th>TIME</th><th>BPM</th><th>SPO2</th><th>DIAGNOSTIC</th></tr></thead>
                        <tbody id="liveTable"></tbody>
                    </table>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="card-vip mb-4">
                    <div class="d-flex justify-content-between align-items-start mb-4">
                        <h5 class="text-secondary"><i class="fas fa-tint me-2"></i>BLOOD OXYGEN</h5>
                        <div class="val-spo2 value-display" id="spo2Val">--</div>
                    </div>
                    <div style="height: 150px;"><canvas id="spo2Chart"></canvas></div>
                </div>
                <div class="card-vip" style="background: linear-gradient(135deg, rgba(157, 78, 221, 0.1), transparent);">
                    <h5 class="mb-3"><i class="fas fa-brain me-2 text-purple"></i>AI PREDICTION</h5>
                    <div id="aiBox" class="p-3 rounded border border-secondary bg-dark">
                        Waiting for data stream...
                    </div>
                    <button class="btn btn-vip w-100 mt-3 fs-6" onclick="runDiagnosis()">START AI SCAN</button>
                </div>
            </div>
        </div>
    </div>

    <div id="patient" class="tab-pane">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card-vip">
                    <h3 class="mb-5 text-center" style="font-family: 'Orbitron'">PATIENT MASTER FILE</h3>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="text-secondary mb-2">FULL NAME</label>
                            <input type="text" class="form-control input-vip" id="inputName" placeholder="John Doe">
                        </div>
                        <div class="col-md-6">
                            <label class="text-secondary mb-2">AGE / GENDER</label>
                            <input type="text" class="form-control input-vip" placeholder="25 / Male">
                        </div>
                        <div class="col-md-12">
                            <label class="text-secondary mb-2">CLINICAL NOTES</label>
                            <textarea class="form-control input-vip" rows="5" placeholder="History of hypertension..."></textarea>
                        </div>
                    </div>
                    <button class="btn btn-vip mt-5 w-100">COMMIT DATA TO BLOCKCHAIN</button>
                </div>
            </div>
        </div>
    </div>

    <div id="history" class="tab-pane">
        <div class="card-vip">
            <h4 class="mb-4" style="font-family: 'Orbitron'"><i class="fas fa-history me-2"></i>SYSTEM LOGS</h4>
            <table class="table-vip text-center">
                <thead><tr><th>TIMESTAMP</th><th>METRIC</th><th>VALUE</th><th>DEVIATION</th></tr></thead>
                <tbody id="fullHistoryTable"></tbody>
            </table>
        </div>
    </div>

    <div id="news" class="tab-pane">
        <div class="row" id="newsContainer"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBiDaQIash5NR2nH8FhQa56jj3OqxPM210",
        databaseURL: "https://doan2-cdeec-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let bpmChart, spo2Chart, currentId = "";

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash-screen').style.transform = 'translateY(-100%)';
            setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 600);
        }, 2000);
    };

    function accessSystem() {
        currentId = document.getElementById('deviceIdInput').value.trim();
        if(!currentId) return;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('idDisplay').innerText = "DEVICE: " + currentId.toUpperCase();
        initCharts();
        startListening();
        loadNews();
    }

    function switchMenu(tabId, el) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item-custom').forEach(i => i.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
    }

    function initCharts() {
        const createConfig = (color) => ({
            type: 'line',
            data: { labels: Array(30).fill(''), datasets: [{ data: [], borderColor: color, borderWidth: 3, fill: true, backgroundColor: color+'11', tension: 0.4, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false }, scales: { x: { display: false }, y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#444' } } } }
        });
        bpmChart = new Chart(document.getElementById('bpmChart'), createConfig('#ff2a5f'));
        spo2Chart = new Chart(document.getElementById('spo2Chart'), createConfig('#00e5ff'));
    }

    function startListening() {
        db.ref("/devices/" + currentId).on('value', snap => {
            const data = snap.val();
            if(!data) return;

            document.getElementById('bpmVal').innerText = data.bpm;
            document.getElementById('spo2Val').innerText = data.spo2 + "%";

            updateChart(bpmChart, data.bpm);
            updateChart(spo2Chart, data.spo2);

            const row = `<tr><td>${new Date().toLocaleTimeString()}</td><td>${data.bpm}</td><td>${data.spo2}%</td><td><span class="text-success">NORMAL</span></td></tr>`;
            document.getElementById('liveTable').insertAdjacentHTML('afterbegin', row);
            if(document.getElementById('liveTable').rows.length > 5) document.getElementById('liveTable').deleteRow(5);
        });
    }

    function updateChart(chart, val) {
        chart.data.datasets[0].data.push(val);
        if(chart.data.datasets[0].data.length > 30) chart.data.datasets[0].data.shift();
        chart.update('none');
    }

    function runDiagnosis() {
        const aiBox = document.getElementById('aiBox');
        aiBox.innerHTML = '<div class="spinner-border spinner-border-sm text-info"></div> ANALYZING BIO-METRIC DATA...';
        setTimeout(() => {
            aiBox.innerHTML = '<p class="text-success m-0"><i class="fas fa-check-circle me-2"></i>ANALYSIS COMPLETE: Hemodynamic stability confirmed. No immediate cardiac risk detected.</p>';
        }, 2000);
    }

    function loadNews() {
        const feeds = [
            {t: "Global Healthcare AI Trends 2026", d: "Neural Network Medical Review"},
            {t: "New Breakthrough in SpO2 Nanotech", d: "Silicon Valley Health"},
            {t: "Cardiology: Remote Monitoring Future", d: "HealthTech Journal"}
        ];
        document.getElementById('newsContainer').innerHTML = feeds.map(f => `
            <div class="col-md-4"><div class="card-vip">
                <small class="text-info">${f.d}</small>
                <h6 class="mt-2 fw-bold text-white">${f.t}</h6>
                <button class="btn btn-sm btn-outline-info mt-3">READ DECRYPTED FEED</button>
            </div></div>
        `).join('');
    }
</script>
</body>
</html>
