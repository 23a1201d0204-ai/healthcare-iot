<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED-IOT | Pro Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { 
            --bg-dark: #0b1120; 
            --card-bg: rgba(30, 41, 59, 0.7);
            --neon-red: #ff2a5f;
            --neon-cyan: #00f3ff;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body { 
            background: var(--bg-dark); 
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, transparent 70%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
        }
        
        /* Màn hình đăng nhập */
        #login-overlay { position: fixed; inset: 0; background: rgba(11, 17, 32, 0.95); backdrop-filter: blur(10px); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .login-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 243, 255, 0.1); width: 380px; text-align: center; }
        .login-card input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: white; }
        .login-card input:focus { background: rgba(0,0,0,0.5); color: white; border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,243,255,0.3); }
        .btn-neon { background: transparent; color: var(--neon-cyan); border: 1px solid var(--neon-cyan); transition: 0.3s; }
        .btn-neon:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }

        /* Sidebar & Layout */
        .sidebar { background: rgba(15, 23, 42, 0.9); border-right: 1px solid rgba(255,255,255,0.05); height: 100vh; position: fixed; width: 260px; padding: 20px; backdrop-filter: blur(10px); }
        .main-content { margin-left: 260px; padding: 30px; }
        .nav-link { color: var(--text-muted); transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--neon-cyan); text-shadow: 0 0 8px rgba(0,243,255,0.5); }
        
        /* Card & Stats */
        .card-stat { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .val-display { font-size: 4rem; font-weight: 800; font-family: monospace; letter-spacing: -2px; }
        .unit { font-size: 1.5rem; color: var(--text-muted); font-weight: normal; letter-spacing: 0; }
        
        /* Neon Colors */
        .text-neon-red { color: var(--neon-red); text-shadow: 0 0 15px rgba(255, 42, 95, 0.6); }
        .text-neon-cyan { color: var(--neon-cyan); text-shadow: 0 0 15px rgba(0, 243, 255, 0.6); }
        
        .pulse { animation: heart 0.8s infinite; }
        @keyframes heart { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        
        .table { color: var(--text-main); }
        .table thead { color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <i class="fas fa-heartbeat fa-4x mb-4 text-neon-cyan"></i>
        <h4 class="fw-bold mb-1 text-white">SYSTEM LOGIN</h4>
        <p class="text-muted small mb-4">Secure Medical Interface</p>
        <input type="text" id="deviceIdInput" class="form-control mb-4 text-center py-2" placeholder="Nhập Device ID (VD: ESP8266_01)">
        <button onclick="accessDevice()" class="btn btn-neon w-100 fw-bold py-2">TRUY CẬP HỆ THỐNG</button>
    </div>
</div>

<div class="sidebar">
    <div class="mb-5 text-center mt-3">
        <h3 class="fw-bold text-white"><i class="fas fa-wave-square text-neon-cyan me-2"></i>MED-PRO</h3>
    </div>
    <nav class="nav flex-column">
        <a class="nav-link active fw-bold py-3" href="#"><i class="fas fa-desktop me-3"></i> Monitor</a>
        <a class="nav-link py-3" href="#"><i class="fas fa-notes-medical me-3"></i> Lịch sử bệnh án</a>
        <a class="nav-link py-3" href="#"><i class="fas fa-cogs me-3"></i> Cấu hình</a>
    </nav>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="fw-bold mb-1">Mã thiết bị: <span id="idDisplay" class="text-neon-cyan">---</span></h2>
            <div class="text-muted" id="realtimeClock" style="font-family: monospace;">Đang kết nối hệ thống...</div>
        </div>
        <div id="connectionStatus" class="badge bg-dark border border-secondary p-2 px-3 rounded-pill">
            <i class="fas fa-circle text-secondary me-2 pulse" id="statusDot"></i> <span id="statusText">Offline</span>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card-stat">
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted fw-bold tracking-wide">HEART RATE (BPM)</span>
                    <i class="fas fa-heart text-neon-red pulse fs-4"></i>
                </div>
                <div class="val-display text-neon-red" id="bpmVal">0<span class="unit">bpm</span></div>
                <div class="mt-3" style="height: 120px;"><canvas id="bpmChart"></canvas></div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card-stat">
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted fw-bold tracking-wide">BLOOD OXYGEN (SPO2)</span>
                    <i class="fas fa-lungs text-neon-cyan fs-4"></i>
                </div>
                <div class="val-display text-neon-cyan" id="spo2Val">0<span class="unit">%</span></div>
                <div class="mt-3" style="height: 120px;"><canvas id="spo2Chart"></canvas></div>
            </div>
        </div>
    </div>

    <div class="card-stat mt-4">
        <h5 class="fw-bold mb-4"><i class="fas fa-list-ul me-2 text-neon-cyan"></i> Dữ liệu đo gần đây</h5>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead><tr><th>Thời gian</th><th>Nhịp tim (BPM)</th><th>Nồng độ Oxy (SpO2)</th><th>Đánh giá</th></tr></thead>
                <tbody id="historyTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBiDaQIash5NR2nH8FhQa56jj3OqxPM210",
        authDomain: "doan2-cdeec.firebaseapp.com",
        databaseURL: "https://doan2-cdeec-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "doan2-cdeec",
        storageBucket: "doan2-cdeec.firebasestorage.app",
        messagingSenderId: "424476794342",
        appId: "1:424476794342:web:3e59530ed2b69159d6ca27"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentId = "";
    let bpmChart, spo2Chart;

    Chart.defaults.color = '#94a3b8';
    Chart.defaults.font.family = 'Inter';

    function initCharts() {
        const commonOptions = { 
            responsive: true, maintainAspectRatio: false, plugins: { legend: false }, 
            scales: { 
                x: { display: false }, 
                y: { grid: { color: "rgba(255,255,255,0.05)" }, border: { dash: [5, 5] } } 
            },
            elements: { point: { radius: 0, hitRadius: 10, hoverRadius: 5 } }
        };

        bpmChart = new Chart(document.getElementById('bpmChart'), { 
            type: 'line', 
            data: { labels: Array(15).fill(''), datasets: [{ data: [], borderColor: '#ff2a5f', borderWidth: 3, tension: 0.4, shadowBlur: 10, shadowColor: '#ff2a5f' }] }, 
            options: commonOptions 
        });

        spo2Chart = new Chart(document.getElementById('spo2Chart'), { 
            type: 'line', 
            data: { labels: Array(15).fill(''), datasets: [{ data: [], borderColor: '#00f3ff', borderWidth: 3, tension: 0.4 }] }, 
            options: commonOptions 
        });
    }

    function accessDevice() {
        const input = document.getElementById('deviceIdInput').value.trim();
        if(!input) return alert("Hệ thống yêu cầu mã ID hợp lệ!");
        currentId = input;
        
        document.getElementById('login-overlay').style.opacity = "0";
        setTimeout(() => {
            document.getElementById('login-overlay').style.display = "none";
            document.getElementById('idDisplay').innerText = currentId;
            initCharts();
            startListening();
        }, 500);
    }

    function startListening() {
        db.ref("/devices/" + currentId).on('value', (s) => {
            const data = s.val();
            if(!data) return;
            
            // Format numbers with leading zero if needed
            let bpmStr = data.bpm < 10 && data.bpm > 0 ? "0"+data.bpm : data.bpm;
            let spo2Str = data.spo2;

            document.getElementById('bpmVal').innerHTML = `${bpmStr}<span class="unit">bpm</span>`;
            document.getElementById('spo2Val').innerHTML = `${spo2Str}<span class="unit">%</span>`;
            
            // Update Online Status
            document.getElementById('statusDot').className = "fas fa-circle text-success me-2 pulse";
            document.getElementById('statusText').innerText = "Trực tuyến";
            document.getElementById('statusText').className = "text-success fw-bold";

            // Update Charts
            [bpmChart, spo2Chart].forEach((c, i) => {
                c.data.datasets[0].data.push(i === 0 ? data.bpm : data.spo2);
                if(c.data.datasets[0].data.length > 15) c.data.datasets[0].data.shift();
                c.update();
            });

            // Add History (Only if > 0)
            if(data.bpm > 0) {
                const statusHtml = data.bpm > 100 || data.spo2 < 94 
                    ? `<span class="badge bg-danger bg-opacity-25 text-danger border border-danger rounded-pill px-3">Cảnh báo</span>`
                    : `<span class="badge bg-success bg-opacity-25 text-success border border-success rounded-pill px-3">Ổn định</span>`;
                
                const row = `<tr>
                    <td class="text-muted">${new Date().toLocaleTimeString('vi-VN')}</td>
                    <td class="fw-bold text-white">${data.bpm}</td>
                    <td class="fw-bold text-white">${data.spo2}%</td>
                    <td>${statusHtml}</td>
                </tr>`;
                
                const hTable = document.getElementById('historyTable');
                hTable.insertAdjacentHTML('afterbegin', row);
                if(hTable.rows.length > 6) hTable.deleteRow(6);
            }
        });
    }

    setInterval(() => { document.getElementById('realtimeClock').innerText = new Date().toLocaleString('vi-VN') + " | SYSTEM SECURE"; }, 1000);
</script>
</body>
</html>
