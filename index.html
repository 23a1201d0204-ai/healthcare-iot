<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Theo Dõi Y Tế Chuyên Sâu - Premium Neon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root { 
            --bg-body: #050508; --bg-sidebar: #0c0c12; --bg-card: #11111a;         
            --text-primary: #f8fafc; --text-secondary: #8b9bb4; --border-color: #1e1e2d;   
            --neon-hr: #ff2a5f; --neon-spo2: #00e5ff; --neon-success: #00ff88;   
            --neon-warning: #ffb703; --neon-purple: #9d4edd;
        }

        body { background-color: var(--bg-body); color: var(--text-primary); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* --- SPLASH SCREEN VIP PRO --- */
        #splash-screen {
            position: fixed; inset: 0; background: #000; z-index: 100000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.8s ease-in-out;
        }
        .loader-box { position: relative; width: 250px; height: 250px; }
        .circle-outer {
            position: absolute; inset: 0; border: 2px solid var(--neon-spo2);
            border-radius: 50%; border-right-color: transparent; border-bottom-color: transparent;
            animation: spin 1s linear infinite;
        }
        .circle-inner {
            position: absolute; inset: 15px; border: 2px solid var(--neon-hr);
            border-radius: 50%; border-left-color: transparent; border-top-color: transparent;
            animation: spin 2s linear infinite reverse;
        }
        .scan-line {
            position: absolute; width: 80%; left: 10%; height: 2px; background: var(--neon-spo2);
            box-shadow: 0 0 15px var(--neon-spo2); top: 50%; animation: scan 2.5s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes scan { 0%, 100% { top: 20%; } 50% { top: 80%; } }

        /* --- LOGIN OVERLAY --- */
        #login-overlay { 
            position: fixed; inset: 0; background: rgba(5,5,8,0.95); backdrop-filter: blur(10px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--bg-card); border: 1px solid var(--neon-spo2); padding: 40px;
            border-radius: 24px; width: 400px; text-align: center; box-shadow: 0 0 40px rgba(0,229,255,0.2);
        }

        /* --- DASHBOARD STYLE --- */
        .sidebar { width: 260px; position: fixed; height: 100vh; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); padding-top: 20px; }
        .nav-link { color: var(--text-secondary); padding: 15px 25px; transition: 0.3s; border-left: 4px solid transparent; text-decoration: none; display: block; }
        .nav-link:hover, .nav-link.active { color: var(--neon-spo2); background: rgba(0,229,255,0.05); border-left-color: var(--neon-spo2); }
        .main-content { margin-left: 260px; padding: 40px; }
        .card-stat { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 25px; margin-bottom: 25px; }
        .value-display { font-size: 4rem; font-weight: 800; line-height: 1; margin: 15px 0; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="loader-box">
        <div class="circle-outer"></div>
        <div class="circle-inner"></div>
        <div class="scan-line"></div>
        <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;">
            <i class="fas fa-heart-pulse fa-4x text-danger"></i>
        </div>
    </div>
    <h2 class="mt-5 fw-bold" style="letter-spacing: 5px;">MEDICAL AI BOOTING...</h2>
</div>

<div id="login-overlay">
    <div class="login-card">
        <i class="fas fa-user-shield fa-3x text-info mb-4"></i>
        <h3 class="mb-4">HỆ THỐNG GIÁM SÁT</h3>
        <input type="text" id="deviceIdInput" class="form-control bg-dark text-white border-secondary mb-3 py-3 text-center" placeholder="NHẬP ID THIẾT BỊ">
        <button onclick="accessSystem()" class="btn btn-info w-100 py-3 fw-bold">KẾT NỐI NGAY</button>
    </div>
</div>

<div class="sidebar">
    <div class="px-4 mb-5"><h4 class="fw-bold text-white">BIO-MONITOR <span class="text-info">V3</span></h4></div>
    <a href="#" class="nav-link active" onclick="switchMenu('monitor', this)"><i class="fas fa-chart-line me-2"></i> Giám Sát Trực Tiếp</a>
    <a href="#" class="nav-link" onclick="switchMenu('analytics', this)"><i class="fas fa-brain me-2"></i> Chẩn Đoán AI</a>
    <a href="#" class="nav-link" onclick="switchMenu('history', this)"><i class="fas fa-history me-2"></i> Lịch Sử Dữ Liệu</a>
</div>

<div class="main-content">
    <div id="monitor" class="tab-pane active">
        <h2 class="mb-4">Thiết bị: <span id="idDisplay" class="text-info">---</span></h2>
        <div class="row">
            <div class="col-md-6">
                <div class="card-stat">
                    <p class="text-secondary mb-0">NHỊP TIM (BPM)</p>
                    <div id="bpmVal" class="value-display text-danger">0</div>
                    <canvas id="bpmChart" height="150"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card-stat">
                    <p class="text-secondary mb-0">NỒNG ĐỘ OXY (SPO2)</p>
                    <div id="spo2Val" class="value-display text-info">0%</div>
                    <canvas id="spo2Chart" height="150"></canvas>
                </div>
            </div>
        </div>
        <div class="card-stat mt-4">
            <h5>Dữ liệu gần đây</h5>
            <table class="table table-dark table-hover mt-3">
                <thead><tr><th>Thời gian</th><th>BPM</th><th>SpO2</th></tr></thead>
                <tbody id="liveTable"></tbody>
            </table>
        </div>
    </div>

    <div id="analytics" class="tab-pane">
        <div class="card-stat text-center py-5">
            <h3 class="mb-4">Phân tích chuyên sâu AI</h3>
            <button onclick="runDiagnosis()" class="btn btn-primary btn-lg px-5">BẮT ĐẦU QUÉT</button>
            <div id="diagnosisResult" class="mt-4 p-4 rounded bg-dark" style="display:none; border-left: 5px solid var(--neon-spo2);">
                <h4 id="diagTitle"></h4>
                <p id="diagDetail" class="text-secondary"></p>
            </div>
        </div>
    </div>

    <div id="history" class="tab-pane">
        <div class="card-stat">
            <h3>Lịch sử đo lường</h3>
            <table class="table table-dark">
                <thead><tr><th>ID</th><th>BPM</th><th>SpO2</th><th>Thời gian</th></tr></thead>
                <tbody id="fullHistoryTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- PHẦN GIAO DIỆN KHỞI ĐỘNG ---
    window.onload = () => {
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 800);
        }, 3000); // 3 giây để ngắm Splash Screen "Vip Pro"
    };

    function switchMenu(id, el) {
        document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    // --- GIỮ NGUYÊN 100% LOGIC CODE CŨ CỦA BẠN ĐỂ KHÔNG SAI TÍNH NĂNG ---
    
    // 1. Cấu hình Firebase (Thay bằng config của bạn)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentId = "";
    let bpmChart, spo2Chart;

    // 2. Hàm Access (Giữ đúng tên hàm)
    function accessSystem() {
        const idInput = document.getElementById('deviceIdInput').value;
        if(!idInput) return alert("Vui lòng nhập ID!");
        
        currentId = idInput;
        document.getElementById('idDisplay').innerText = currentId;
        document.getElementById('login-overlay').style.display = 'none';
        
        initCharts();
        startListening();
    }

    // 3. Khởi tạo Chart (Giữ đúng ID biểu đồ)
    function initCharts() {
        const ctxBpm = document.getElementById('bpmChart').getContext('2d');
        bpmChart = new Chart(ctxBpm, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'BPM', data: [], borderColor: '#ff2a5f', tension: 0.4 }] },
            options: { plugins: { legend: { display: false } }, scales: { x: { display: false } } }
        });

        const ctxSpo2 = document.getElementById('spo2Chart').getContext('2d');
        spo2Chart = new Chart(ctxSpo2, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'SpO2', data: [], borderColor: '#00e5ff', tension: 0.4 }] },
            options: { plugins: { legend: { display: false } }, scales: { x: { display: false } } }
        });
    }

    // 4. Lắng nghe dữ liệu (Giữ đúng cấu trúc Firebase của bạn)
    function startListening() {
        db.ref('devices/' + currentId).on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            // Cập nhật số hiển thị
            document.getElementById('bpmVal').innerText = data.bpm;
            document.getElementById('spo2Val').innerText = data.spo2 + "%";

            // Cập nhật biểu đồ
            const now = new Date().toLocaleTimeString();
            updateChart(bpmChart, now, data.bpm);
            updateChart(spo2Chart, now, data.spo2);

            // Cập nhật bảng
            const row = `<tr><td>${now}</td><td>${data.bpm}</td><td>${data.spo2}%</td></tr>`;
            document.getElementById('liveTable').insertAdjacentHTML('afterbegin', row);
            document.getElementById('fullHistoryTable').insertAdjacentHTML('afterbegin', `<tr><td>${currentId}</td><td>${data.bpm}</td><td>${data.spo2}%</td><td>${now}</td></tr>`);
        });
    }

    function updateChart(chart, label, data) {
        chart.data.labels.push(label);
        chart.data.datasets[0].data.push(data);
        if(chart.data.labels.length > 15) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
        chart.update();
    }

    // 5. Chẩn đoán AI (Giữ nguyên logic của bạn)
    function runDiagnosis() {
        const bpm = parseInt(document.getElementById('bpmVal').innerText);
        const spo2 = parseInt(document.getElementById('spo2Val').innerText);
        const res = document.getElementById('diagnosisResult');
        res.style.display = 'block';

        if(spo2 < 94) {
            document.getElementById('diagTitle').innerText = "CẢNH BÁO: THIẾU OXY MÁU";
            document.getElementById('diagDetail').innerText = "Nồng độ oxy xuống thấp nguy hiểm. Hãy hít thở sâu và liên hệ y tế.";
        } else {
            document.getElementById('diagTitle').innerText = "TRẠNG THÁI: BÌNH THƯỜNG";
            document.getElementById('diagDetail').innerText = "Các chỉ số sinh tồn của bạn đang ở mức ổn định.";
        }
    }
</script>
</body>
</html>
