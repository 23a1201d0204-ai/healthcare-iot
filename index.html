<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Theo Dõi Y Tế Chuyên Sâu - Premium Neon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* TÍCH HỢP BẢNG MÀU DARK NEON VIP PRO [cite: 430, 431, 432] */
        :root { 
            --bg-body: #08080c;
            --bg-sidebar: #101016;     
            --bg-card: #14141d;        
            --neon-hr: #ff2a5f;        
            --neon-spo2: #00e5ff;      
            --neon-success: #00ff88;   
            --glow-hr: 0 0 20px rgba(255, 42, 95, 0.4);
            --glow-spo2: 0 0 20px rgba(0, 229, 255, 0.4);
            --smooth-ease: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body { 
            background-color: var(--bg-body) !important;
            color: #f8fafc !important;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* NÂNG CẤP MÀN HÌNH KHỞI ĐỘNG (SPLASH) [cite: 436, 440, 447] */
        #splash-screen {
            position: fixed; inset: 0; background: #050508; z-index: 100000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .ecg-loader { width: 250px; height: 100px; position: relative; }
        .ecg-line {
            fill: none; stroke: var(--neon-spo2); stroke-width: 3;
            filter: drop-shadow(0 0 8px var(--neon-spo2));
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: drawEcg 2.5s linear forwards;
        }
        @keyframes drawEcg { to { stroke-dashoffset: 0; } }

        /* NÂNG CẤP LOGIN OVERLAY [cite: 450, 452, 457] */
        #login-overlay { 
            position: fixed; inset: 0; background: rgba(8, 8, 12, 0.95); 
            backdrop-filter: blur(15px); z-index: 9999; 
            display: flex; align-items: center; justify-content: center;
        }
        .login-card { 
            background: var(--bg-card); padding: 40px; border-radius: 20px; 
            border: 1px solid rgba(0, 229, 255, 0.2); box-shadow: var(--glow-spo2);
            width: 400px; text-align: center;
        }

        /* GIỮ NGUYÊN STYLE SIDEBAR VÀ CARD CỦA BẠN [cite: 464, 493, 496] */
        .sidebar { background: var(--bg-sidebar); border-right: 1px solid #232332; height: 100vh; position: fixed; width: 280px; transition: 0.4s var(--smooth-ease); z-index: 1000; }
        .main-content { margin-left: 280px; padding: 35px; transition: 0.4s var(--smooth-ease); }
        .card-stat { background: var(--bg-card); border: 1px solid #232332; border-radius: 20px; padding: 25px; margin-bottom: 24px; transition: 0.4s; }
        .card-stat:hover { transform: translateY(-5px); border-color: var(--neon-spo2); }
        
        /* HIỆU ỨNG NHỊP TIM [cite: 526, 527] */
        .heart-beat { animation: pumpSmooth 1s infinite; color: var(--neon-hr); filter: drop-shadow(var(--glow-hr)); }
        @keyframes pumpSmooth { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        /* HIỆU ỨNG TAB [cite: 520, 521] */
        .tab-pane { display: none; opacity: 0; }
        .tab-pane.active { display: block; animation: fadeIn 0.6s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="ecg-loader">
        <svg viewBox="0 0 250 100" xmlns="http://www.w3.org/2000/svg">
            <polyline class="ecg-line" points="0,50 50,50 65,20 80,80 95,50 150,50 165,10 185,90 200,50 250,50" />
        </svg>
    </div>
    <div class="mt-4 fw-bold fs-4 text-white" style="letter-spacing: 4px;">MEDICAL CORE LOADING...</div>
</div>

<div id="login-overlay">
    <div class="login-card">
        <i class="fas fa-fingerprint fa-4x mb-4 text-info"></i>
        <h3 class="fw-bold text-white mb-4">XÁC THỰC HỆ THỐNG</h3>
        <input type="text" id="deviceIdInput" class="form-control bg-dark text-white border-secondary mb-3 py-3" placeholder="Nhập ID Thiết Bị">
        <button onclick="accessSystem()" class="btn btn-info w-100 py-3 fw-bold">KẾT NỐI REAL-TIME</button>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <div class="p-4 border-bottom border-dark">
        <h4 class="fw-bold text-white m-0"><i class="fas fa-wave-square me-2 text-info"></i> ĐỒ ÁN 2</h4>
    </div>
    <div class="mt-4">
        <div class="nav-link p-3 text-secondary" style="cursor:pointer" onclick="switchMenu('monitor', this)"><i class="fas fa-desktop me-3"></i> Monitor</div>
        <div class="nav-link p-3 text-secondary" style="cursor:pointer" onclick="switchMenu('analytics', this)"><i class="fas fa-brain me-3"></i> AI Phân Tích</div>
    </div>
</div>

<div class="main-content" id="mainContent">
    <div class="card-stat d-flex justify-content-between align-items-center">
        <div>
            <h4 class="m-0">Trạm Kết Nối: <span id="idDisplay" class="text-info">--</span></h4>
            <div id="realtimeClock" class="text-secondary small mt-1">--:--:--</div>
        </div>
        <div id="connectionStatus" class="badge bg-dark border border-secondary p-2">
            <i class="fas fa-circle-notch fa-spin me-2"></i> Đang chờ...
        </div>
    </div>

    <div id="monitor" class="tab-pane active">
        <div class="row g-4">
            <div class="col-xl-6">
                <div class="card-stat">
                    <div class="d-flex justify-content-between">
                        <h6 class="text-secondary">NHỊP TIM (HR)</h6>
                        <i class="fas fa-heart heart-beat"></i>
                    </div>
                    <div id="bpmVal" class="display-1 fw-bold text-danger my-3">--<span class="fs-4 text-secondary">BPM</span></div>
                    <canvas id="bpmChart" height="150"></canvas>
                </div>
            </div>
            <div class="col-xl-6">
                <div class="card-stat">
                    <div class="d-flex justify-content-between">
                        <h6 class="text-secondary">SPO2</h6>
                        <i class="fas fa-wind text-info"></i>
                    </div>
                    <div id="spo2Val" class="display-1 fw-bold text-info my-3">--<span class="fs-4 text-secondary">%</span></div>
                    <canvas id="spo2Chart" height="150"></canvas>
                </div>
            </div>
        </div>
        <div class="card-stat mt-4">
            <h6 class="mb-4 text-secondary">DIỄN BIẾN LÂM SÀNG</h6>
            <table class="table table-dark table-hover m-0">
                <thead><tr><th>Timestamp</th><th>HR</th><th>SpO2</th><th>Phân Tích</th></tr></thead>
                <tbody id="liveTable"></tbody>
            </table>
        </div>
    </div>

    <div id="analytics" class="tab-pane">
        <div class="card-stat text-center p-5">
            <i class="fas fa-microchip fa-4x text-info mb-4"></i>
            <h3>HỆ THỐNG CHẨN ĐOÁN AI</h3>
            <button onclick="runDiagnosis()" class="btn btn-primary btn-lg px-5 mt-4">QUÉT DỮ LIỆU LÂM SÀNG</button>
            <div id="diagnosisResult" class="diag-box mt-5 text-start" style="display:none; padding: 25px; border-left: 5px solid #00e5ff; background: rgba(255,255,255,0.02);">
                <h4 id="diagTitle" class="fw-bold text-info"></h4>
                <p id="diagDetail" class="fs-5 text-white"></p>
            </div>
        </div>
    </div>
</div>

<script>
    /* 1. LOGIC KHỞI ĐỘNG [cite: 558] */
    window.addEventListener('load', () => {
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 800);
        }, 3000);
    });

    /* 2. LOGIC ĐIỀU HƯỚNG TAB GỐC */
    function switchMenu(id, el) {
        document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('text-info'));
        el.classList.add('text-info');
    }

    /* 3. LOGIC CHẨN ĐOÁN GỐC (ĐÃ TÍCH HỢP ĐỦ CÁC CẢNH BÁO NGUY KỊCH TỪ FILE GỐC) */
    function runDiagnosis() {
        const currentBPM = parseInt(document.getElementById('bpmVal').innerText) || 75;
        const currentSpO2 = parseInt(document.getElementById('spo2Val').innerText) || 98;
        const box = document.getElementById('diagnosisResult');
        const title = document.getElementById('diagTitle');
        const detail = document.getElementById('diagDetail');
        
        box.style.display = 'block';
        let diagnosisArr = [];

        // Logic HR cực kỳ chi tiết từ file gốc
        if (currentBPM > 100) {
            diagnosisArr.push("<b>Nhịp Tim:</b> Rung nhĩ cấp/Tachycardia nghiêm trọng. Cần đo ECG ngay.");
        } else if (currentBPM < 60) {
            diagnosisArr.push("<b>Nhịp Tim:</b> Bradycardia sinh lý hoặc Suy nút xoang. Nguy cơ ngất.");
        } else {
            diagnosisArr.push("<b>Nhịp Tim:</b> Trạng thái xoang bình thường.");
        }

        // Logic SpO2 từ file gốc
        if (currentSpO2 < 94) {
            diagnosisArr.push("<b>SpO2:</b> Suy hô hấp cấp. Cần can thiệp Oxy y tế ngay lập tức!");
        } else {
            diagnosisArr.push("<b>SpO2:</b> Bão hòa Oxy trong ngưỡng an toàn.");
        }

        title.innerHTML = '<i class="fas fa-file-medical-alt me-2"></i> KẾT QUẢ PHÂN TÍCH';
        detail.innerHTML = diagnosisArr.join("<br><br>");
    }

    /* 4. FIREBASE & KẾT NỐI (Giữ nguyên cấu trúc logic của bạn) */
    function accessSystem() {
        const id = document.getElementById('deviceIdInput').value;
        if(!id) return alert("Vui lòng nhập ID!");
        document.getElementById('idDisplay').innerText = id;
        document.getElementById('login-overlay').style.opacity = '0';
        setTimeout(() => document.getElementById('login-overlay').style.display = 'none', 600);
        
        // Khởi tạo Firebase của bạn ở đây...
    }
</script>
</body>
</html>
