<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Pro Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --bg: #f0f4f8; --primary: #2563eb; --card-bg: #ffffff; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #login-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #1e3a8a, #2563eb); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .login-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        .sidebar { background: white; border-right: 1px solid #e2e8f0; height: 100vh; position: fixed; width: 260px; padding: 20px; }
        .main-content { margin-left: 260px; padding: 30px; }
        .card-stat { background: white; border: none; border-radius: 20px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .val-display { font-size: 3.5rem; font-weight: 800; }
        .unit { font-size: 1.2rem; color: #64748b; }
        .pulse { animation: heart 0.8s infinite; }
        @keyframes heart { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <i class="fas fa-user-shield fa-3x text-primary mb-3"></i>
        <h4>Xác thực thiết bị</h4>
        <p class="text-muted small">Nhập Device ID của bạn</p>
        <input type="text" id="deviceIdInput" class="form-control mb-3 text-center" placeholder="VD: ESP8266_01">
        <button onclick="accessDevice()" class="btn btn-primary w-100 fw-bold">KẾT NỐI NGAY</button>
    </div>
</div>

<div class="sidebar">
    <div class="mb-5 text-center"><h3 class="text-primary fw-bold"><i class="fas fa-hand-holding-medical"></i> MED-IOT</h3></div>
    <nav class="nav flex-column">
        <a class="nav-link active fw-bold" href="#"><i class="fas fa-th-large me-2"></i> Dashboard</a>
        <a class="nav-link text-muted" href="#"><i class="fas fa-history me-2"></i> Nhật ký</a>
        <a class="nav-link text-muted" href="#"><i class="fas fa-info-circle me-2"></i> Thông tin</a>
    </nav>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">Thiết bị: <span id="idDisplay" class="text-primary">---</span></h2>
            <small class="text-muted" id="realtimeClock"></small>
        </div>
        <div id="connectionStatus" class="badge bg-secondary p-2 rounded-pill">Đang chờ...</div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card-stat">
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted fw-bold">NHỊP TIM</span>
                    <i class="fas fa-heartbeat text-danger pulse"></i>
                </div>
                <div class="val-display text-danger" id="bpmVal">0 <span class="unit">BPM</span></div>
                <canvas id="bpmChart" style="max-height: 100px;"></canvas>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card-stat">
                <div class="d-flex justify-content-between mb-2 text-info">
                    <span class="text-muted fw-bold">SPO2</span>
                    <i class="fas fa-wind"></i>
                </div>
                <div class="val-display text-info" id="spo2Val">0 <span class="unit">%</span></div>
                <canvas id="spo2Chart" style="max-height: 100px;"></canvas>
            </div>
        </div>
    </div>

    <div class="card-stat mt-4">
        <h5><i class="fas fa-list-ul me-2 text-primary"></i> Nhật ký đo gần đây</h5>
        <div class="table-responsive">
            <table class="table align-middle mt-2">
                <thead><tr><th>Thời gian</th><th>BPM</th><th>SpO2</th><th>Trạng thái</th></tr></thead>
                <tbody id="historyTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBiDaQIash5NR2nH8FhQa56jj3OqxPM210",
        authDomain: "doan2-cdeec.firebaseapp.com",
        databaseURL: "https://doan2-cdeec-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "doan2-cdeec",
        storageBucket: "doan2-cdeec.firebasestorage.app",
        messagingSenderId: "424476794342",
        appId: "1:424476794342:web:3e59530ed2b69159d6ca27"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentId = "";
    let bpmChart, spo2Chart;

    function initCharts() {
        const options = { responsive: true, plugins: { legend: false }, scales: { x: { display: false }, y: { display: false } } };
        bpmChart = new Chart(document.getElementById('bpmChart'), { type: 'line', data: { labels: Array(10).fill(''), datasets: [{ data: [], borderColor: '#dc3545', tension: 0.4 }] }, options });
        spo2Chart = new Chart(document.getElementById('spo2Chart'), { type: 'line', data: { labels: Array(10).fill(''), datasets: [{ data: [], borderColor: '#0dcaf0', tension: 0.4 }] }, options });
    }

    function accessDevice() {
        const input = document.getElementById('deviceIdInput').value.trim();
        if(!input) return alert("Nhập mã ID!");
        currentId = input;
        document.getElementById('login-overlay').style.opacity = "0";
        setTimeout(() => {
            document.getElementById('login-overlay').style.display = "none";
            document.getElementById('idDisplay').innerText = currentId;
            initCharts();
            startListening();
        }, 500);
    }

    function startListening() {
        db.ref("/devices/" + currentId).on('value', (s) => {
            const data = s.val();
            if(!data) return;
            
            document.getElementById('bpmVal').innerHTML = `${data.bpm} <span class="unit">BPM</span>`;
            document.getElementById('spo2Val').innerHTML = `${data.spo2} <span class="unit">%</span>`;
            document.getElementById('connectionStatus').className = "badge bg-success p-2 rounded-pill";
            document.getElementById('connectionStatus').innerText = "Trực tuyến";

            // Update Charts
            [bpmChart, spo2Chart].forEach((c, i) => {
                c.data.datasets[0].data.push(i === 0 ? data.bpm : data.spo2);
                if(c.data.datasets[0].data.length > 10) c.data.datasets[0].data.shift();
                c.update();
            });

            // Add History
            if(data.bpm > 0) {
                const row = `<tr><td>${new Date().toLocaleTimeString()}</td><td>${data.bpm}</td><td>${data.spo2}%</td><td><span class="badge ${data.bpm > 100 ? 'bg-danger':'bg-success'}">${data.bpm > 100 ? 'Cao':'Bình thường'}</span></td></tr>`;
                const hTable = document.getElementById('historyTable');
                hTable.insertAdjacentHTML('afterbegin', row);
                if(hTable.rows.length > 5) hTable.deleteRow(5);
            }
        });
    }

    setInterval(() => { document.getElementById('realtimeClock').innerText = new Date().toLocaleString('vi-VN'); }, 1000);
</script>
</body>
</html>
